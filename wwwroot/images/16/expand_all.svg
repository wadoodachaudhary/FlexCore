<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Back box top-right corner -->
  <path d="M 6 2 H 14 V 10" fill="none" stroke="#808080" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
  <!-- Middle box top-right corner -->
  <path d="M 4 4 H 12 V 12" fill="none" stroke="#808080" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" />
  <!-- Front box square -->
  <rect x="2" y="6" width="8" height="8" fill="none" stroke="#808080" stroke-width="1.5" />
  <!-- Plus horizontal line -->
  <line x1="4" y1="10" x2="8" y2="10" stroke="#808080" stroke-width="1.5" stroke-linecap="square" />
  <!-- Plus vertical line -->
  <line x1="6" y1="8" x2="6" y2="12" stroke="#808080" stroke-width="1.5" stroke-linecap="square" />
</svg>
